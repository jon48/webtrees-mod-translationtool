name: Code style PHP

on:
  push:
    branches-ignore:
      - '**-dev'
  pull_request:

jobs:
  phpcs:
    runs-on: ubuntu-latest
    name: phpcs PHP/PHTML

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - run: composer install --no-progress

      - name: PHPCS
        run: composer webtrees-mod-translationtool:phpcs
